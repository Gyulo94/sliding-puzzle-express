name: CI/CD 파이프라인 (sliding-puzzle-server)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20.19.0 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: npm 의존성 설치
        run: npm install

      - name: 도커 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sliding-puzzle-express .

      - name: 도커 허브 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 도커 허브에 이미지 푸시
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sliding-puzzle-express

      - name: 원격서버에 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            cd ${{ secrets.REMOTE_PROJECT_PATH }}
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            echo "${{secrets.ENV_FILE}}" > ./.env
            docker pull ${{ secrets.DOCKER_USERNAME }}/sliding-puzzle-express:latest

            docker stop sliding-puzzle-express || true
            docker rm sliding-puzzle-express || true 

            docker run -d \
            -p 8004:8000 \
            --name sliding-puzzle-express \
            --network nginx-proxy_gyubuntu_net \
            --env-file ./.env \
            ${{ secrets.DOCKER_USERNAME }}/sliding-puzzle-express:latest \
            sh -c "npm run start" 
            docker image prune -f

      - name: 성공 메세지 출력
        if: success()
        run: echo "🎉 CI/CD 파이프라인 성공"
